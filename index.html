<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu | Numpang Ngopi. Crb</title>
    <style>
        :root {
            --primary: #4A3022; /* Kopi pekat */
            --secondary: #A07855; /* Warna susu/krim */
            --accent: #D4A373;
            --bg: #FAEDCD;
            --text: #2C1E16;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
        }

        header {
            background-color: var(--primary);
            color: white;
            text-align: center;
            padding: 2rem 1rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        header h1 { margin: 0; font-size: 2.5rem; letter-spacing: 1px;}
        header p { margin-top: 5px; color: var(--accent); }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        /* Search Bar */
        .search-container {
            margin-bottom: 2rem;
            text-align: center;
        }
        
        #searchInput {
            width: 100%;
            max-width: 400px;
            padding: 12px 20px;
            border: 2px solid var(--secondary);
            border-radius: 25px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        #searchInput:focus {
            border-color: var(--primary);
            box-shadow: 0 0 8px rgba(160, 120, 85, 0.4);
        }

        /* Menu Grid */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .menu-card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            transition: transform 0.2s, box-shadow 0.2s;
            border-left: 5px solid var(--primary);
        }

        .menu-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }

        .menu-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .menu-name {
            font-size: 1.25rem;
            font-weight: bold;
            color: var(--primary);
            margin: 0;
        }

        .menu-price {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--secondary);
            background: #fdf5e6;
            padding: 4px 10px;
            border-radius: 20px;
        }

        .menu-desc {
            font-size: 0.9rem;
            color: #666;
            line-height: 1.5;
            margin: 0;
        }

        .loading, .error-msg {
            text-align: center;
            font-size: 1.2rem;
            color: var(--primary);
            grid-column: 1 / -1;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 1.5rem;
            background-color: var(--primary);
            color: var(--accent);
            margin-top: 2rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>Numpang Ngopi. Crb</h1>
        <p>Buku Menu Interaktif</p>
    </header>

    <div class="container">
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Cari minuman favoritmu (cth: Latte, Aren)...">
        </div>

        <div class="menu-grid" id="menuGrid">
            <div class="loading">Memuat menu dari Firebase...</div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Numpang Ngopi. Crb | Di-host di GitHub Pages</p>
    </footer>

    <script>
        // URL Realtime Database Kamu + /menu.json untuk mengambil datanya via REST API
        const FIREBASE_URL = "https://develop-kopi-default-rtdb.asia-southeast1.firebasedatabase.app/menu.json";
        
        let menuData = [];
        const menuGrid = document.getElementById('menuGrid');
        const searchInput = document.getElementById('searchInput');

        // Fungsi format Rupiah
        const formatRupiah = (angka) => {
            return new Intl.NumberFormat('id-ID', {
                style: 'currency',
                currency: 'IDR',
                minimumFractionDigits: 0
            }).format(angka);
        };

        // Fungsi menampilkan menu ke HTML
        const renderMenu = (data) => {
            menuGrid.innerHTML = ''; // Bersihkan loading
            
            if (data.length === 0) {
                menuGrid.innerHTML = '<div class="error-msg">Minuman tidak ditemukan :(</div>';
                return;
            }

            data.forEach(item => {
                if(!item) return; // Skip array kosong dari Firebase (jika ada)

                const card = document.createElement('div');
                card.className = 'menu-card';
                card.innerHTML = `
                    <div class="menu-header">
                        <h3 class="menu-name">${item.nama}</h3>
                        <span class="menu-price">${formatRupiah(item.harga)}</span>
                    </div>
                    <p class="menu-desc">${item.deskripsi}</p>
                `;
                menuGrid.appendChild(card);
            });
        };

        // Mengambil data dari Firebase
        fetch(FIREBASE_URL)
            .then(response => {
                if (!response.ok) throw new Error('Gagal mengambil data Firebase');
                return response.json();
            })
            .then(data => {
                // Filter nilai null/kosong jika ada (biasa terjadi di Firebase RTDB array)
                menuData = data.filter(item => item !== null); 
                renderMenu(menuData);
            })
            .catch(error => {
                console.error('Error:', error);
                menuGrid.innerHTML = `
                    <div class="error-msg">
                        <p>Gagal memuat dari Firebase. Pastikan Rules Database diset Publik.</p>
                        <p>Silakan ikuti "Langkah 1" pada instruksi.</p>
                    </div>`;
            });

        // Fitur Pencarian Interaktif
        searchInput.addEventListener('keyup', (e) => {
            const query = e.target.value.toLowerCase();
            const filteredMenu = menuData.filter(item => 
                item.nama.toLowerCase().includes(query) || 
                item.deskripsi.toLowerCase().includes(query)
            );
            renderMenu(filteredMenu);
        });
    </script>
</body>
</html>
