<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Numpang Ngopi | Signature Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #161616;
            --primary: #ffffff;
            --secondary: #888888;
            --accent: #E2B07E; /* Warna emas kopi */
            --border: #262626;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--primary);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        /* Container Layout */
        .app-wrapper {
            max-width: 500px;
            margin: 0 auto;
            min-height: 100vh;
            background: var(--bg);
            position: relative;
        }

        /* Hero Header */
        header {
            padding: 40px 24px 20px 24px;
            background: linear-gradient(to bottom, #1a1a1a, var(--bg));
        }

        .brand-logo {
            font-weight: 800;
            font-size: 24px;
            letter-spacing: -1px;
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .brand-tagline {
            color: var(--secondary);
            font-size: 13px;
            font-weight: 400;
        }

        /* Table Input Section */
        .table-section {
            padding: 0 24px 20px 24px;
        }

        .input-group {
            position: relative;
            background: var(--surface);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 12px 16px;
            display: flex;
            align-items: center;
        }

        .input-group input {
            background: transparent;
            border: none;
            color: white;
            font-size: 15px;
            width: 100%;
            outline: none;
            font-family: inherit;
        }

        /* Menu Grid */
        .menu-container {
            padding: 0 24px 120px 24px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin: 30px 0 20px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .menu-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s ease;
        }

        .menu-card:active {
            transform: scale(0.98);
        }

        .menu-info { flex: 1; }

        .menu-name {
            font-weight: 600;
            font-size: 16px;
            margin: 0 0 4px 0;
            color: var(--primary);
        }

        .menu-desc {
            font-size: 12px;
            color: var(--secondary);
            margin: 0 0 12px 0;
            max-width: 80%;
        }

        .menu-price {
            font-weight: 700;
            color: var(--accent);
            font-size: 15px;
        }

        /* Controls */
        .controls {
            display: flex;
            align-items: center;
            background: var(--bg);
            border-radius: 30px;
            padding: 4px;
            border: 1px solid var(--border);
        }

        .btn-action {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: white;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .btn-plus { background: var(--primary); color: var(--bg); }

        .qty-label {
            padding: 0 12px;
            font-weight: 600;
            min-width: 20px;
            text-align: center;
        }

        /* Floating Checkout Bar */
        .floating-cart {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(150%);
            width: calc(100% - 48px);
            max-width: 452px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
        }

        .floating-cart.active {
            transform: translateX(-50%) translateY(0);
        }

        .cart-text { color: #0a0a0a; }
        .cart-total-label { font-size: 11px; text-transform: uppercase; font-weight: 600; opacity: 0.6; }
        .cart-total-value { font-size: 18px; font-weight: 800; }

        .btn-send {
            background: #0a0a0a;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
        }

        /* Shimmer Loading */
        .shimmer {
            height: 100px;
            background: var(--surface);
            border-radius: 16px;
            margin-bottom: 16px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
    </style>
</head>
<body>

<div class="app-wrapper">
    <header>
        <div class="brand-logo">Numpang Ngopi.</div>
        <div class="brand-tagline">Signature Coffee & Brew Selection</div>
    </header>

    <div class="table-section">
        <div class="input-group">
            <input type="text" id="noMeja" placeholder="Nomor Meja Anda...">
        </div>
    </div>

    <div class="menu-container">
        <div class="section-title">Coffee Selection</div>
        <div id="menuContent">
            <div class="shimmer"></div>
            <div class="shimmer"></div>
            <div class="shimmer"></div>
        </div>
    </div>

    <div class="floating-cart" id="cartBar">
        <div class="cart-text">
            <div class="cart-total-label" id="itemCount">0 Items Selected</div>
            <div class="cart-total-value" id="totalPrice">Rp0</div>
        </div>
        <button class="btn-send" onclick="checkout()">Pesan Sekarang</button>
    </div>
</div>

<script>
    const DB_URL = "https://develop-kopi-default-rtdb.asia-southeast1.firebasedatabase.app/menu.json";
    const WHATSAPP = "628984290300";
    
    let dbMenu = [];
    let cart = {};

    async function loadMenu() {
        try {
            const res = await fetch(DB_URL);
            const data = await res.json();
            dbMenu = data.filter(i => i !== null);
            render();
        } catch (e) {
            document.getElementById('menuContent').innerHTML = "Gagal memuat menu.";
        }
    }

    function updateQty(id, delta) {
        if (!cart[id]) cart[id] = 0;
        cart[id] += delta;
        if (cart[id] <= 0) delete cart[id];
        render();
        updateUI();
    }

    function updateUI() {
        let total = 0;
        let count = 0;
        for (let id in cart) {
            let item = dbMenu.find(m => m.id == id);
            total += (item.harga * cart[id]);
            count += cart[id];
        }

        const bar = document.getElementById('cartBar');
        document.getElementById('totalPrice').innerText = new Intl.NumberFormat('id-ID', {style:'currency', currency:'IDR', minimumFractionDigits:0}).format(total);
        document.getElementById('itemCount').innerText = `${count} Items Selected`;

        if (count > 0) bar.classList.add('active');
        else bar.classList.remove('active');
    }

    function render() {
        const container = document.getElementById('menuContent');
        container.innerHTML = dbMenu.map(item => `
            <div class="menu-card">
                <div class="menu-info">
                    <h3 class="menu-name">${item.nama}</h3>
                    <p class="menu-desc">${item.deskripsi}</p>
                    <span class="menu-price">${new Intl.NumberFormat('id-ID', {style:'currency', currency:'IDR', minimumFractionDigits:0}).format(item.harga)}</span>
                </div>
                <div class="controls">
                    <button class="btn-action" onclick="updateQty(${item.id}, -1)">-</button>
                    <span class="qty-label">${cart[item.id] || 0}</span>
                    <button class="btn-action btn-plus" onclick="updateQty(${item.id}, 1)">+</button>
                </div>
            </div>
        `).join('');
    }

    function checkout() {
        const meja = document.getElementById('noMeja').value;
        if (!meja) return alert("Isi nomor meja dulu ya bos.");

        let text = `*PESANAN BARU - NUMPANG NGOPI*\n\n`;
        text += `📍 *Meja:* ${meja}\n`;
        text += `━━━━━━━━━━━━━━━\n`;

        let total = 0;
        for (let id in cart) {
            let item = dbMenu.find(m => m.id == id);
            let sub = item.harga * cart[id];
            total += sub;
            text += `• ${cart[id]}x ${item.nama}\n`;
        }

        text += `━━━━━━━━━━━━━━━\n`;
        text += `*Total: ${new Intl.NumberFormat('id-ID', {style:'currency', currency:'IDR', minimumFractionDigits:0}).format(total)}*`;
        
        window.open(`https://wa.me/${WHATSAPP}?text=${encodeURIComponent(text)}`);
    }

    loadMenu();
</script>

</body>
</html>
